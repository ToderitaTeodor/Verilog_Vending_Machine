name: Questa CI Simulation

on: 
  push:
    branches: [ main, develop, test/vivado_github_actions]
  pull_request:

jobs:
  simulate:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Compile and Simulate with Questa
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:${{ github.workspace }} \
            -w ${{ github.workspace }} \
            ghcr.io/hdl/containers/intel/questa:21.1 \
            bash -c '
              echo "=== Compiling RTL and Testbench ==="
              # Create the working library
              vlib work
              
              # Compile standard Verilog files
              vlog hdl/*.v
              
              # Compile SystemVerilog files and the top testbench
              vlog +incdir+debug/tb +incdir+debug/tests debug/tb/*.sv debug/tests/random_test.sv
              
              echo "=== Running Simulation ==="
              # Run the simulator in console mode
              vsim -c -voptargs="+acc" testbench -do "run -all; quit"
            '
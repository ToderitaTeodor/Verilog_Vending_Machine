name: Questa CI Simulation

on: [push, pull_request]

jobs:
  simulate:
    runs-on: ubuntu-latest
    
    steps:
      # Clear space (Questa is still 15GB, so we need room)
      - name: Maximize build space
        uses: easimon/maximize-build-space@master
        with:
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'
          remove-docker-images: 'true'

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Compile and Simulate with Questa Starter Edition
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:${{ github.workspace }} \
            -w ${{ github.workspace }} \
            # We use HDL Containers, a highly trusted source for EDA tools
            ghcr.io/hdl/containers/intel/questa:21.1 \
            bash -c '
              echo "=== Compiling RTL and Testbench ==="
              # Create the working library
              vlib work
              
              # Compile standard Verilog files
              vlog hdl/*.v
              
              # Compile SystemVerilog files and the top testbench
              vlog +incdir+debug/tb +incdir+debug/tests debug/tb/*.sv debug/tests/random_test.sv
              
              echo "=== Running Simulation ==="
              # Run the simulator in console mode (-c), disable optimizations that hide signals (-voptargs="+acc")
              vsim -c -voptargs="+acc" testbench -do "run -all; quit"
            '
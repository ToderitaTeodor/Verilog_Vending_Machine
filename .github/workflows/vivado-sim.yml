name: Vivado SystemVerilog Simulation

on: 
  push:
    branches: [ main, develop, test/vivado_github_actions]
  pull_request:

jobs:
  simulate:
    runs-on: ubuntu-latest
    
    steps:
      # 1. Clear space FIRST
      - name: Maximize build space
        uses: easimon/maximize-build-space@master
        with:
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'
          remove-docker-images: 'true'

      # 2. Checkout your repository
      - name: Checkout Code
        uses: actions/checkout@v4

      # 3. Pull the image and run the simulation directly via shell
      - name: Compile and Simulate with Vivado Xsim
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:${{ github.workspace }} \
            -w ${{ github.workspace }} \
            gusanagy/xilinx-vivado:2024.1-x11 \
            bash -c '
              # Source Vivado environment
              if [ -f "/opt/Xilinx/Vivado/2024.1/settings64.sh" ]; then
                source /opt/Xilinx/Vivado/2024.1/settings64.sh
              elif [ -f "/tools/Xilinx/Vivado/2024.1/settings64.sh" ]; then
                source /tools/Xilinx/Vivado/2024.1/settings64.sh
              else
                echo "Could not find Vivado settings64.sh file"
                exit 1
              fi

              echo "=== Compiling RTL and Testbench ==="
              xvlog -sv hdl/*.v
              xvlog -sv -i debug/tb -i debug/tests debug/tb/*.sv debug/tests/random_test.sv
              
              echo "=== Elaborating the Design ==="
              xelab -debug typical -top testbench -snapshot tb_snap
              
              echo "=== Running Simulation ==="
              xsim tb_snap -R
            '